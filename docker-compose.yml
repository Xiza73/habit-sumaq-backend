services:
  postgres:
    image: postgres:17-alpine
    container_name: habit_sumaq_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-habit_sumaq}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-habit_sumaq}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
